<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Valentine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffe6e6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      position: relative;
      width: 90%;
      max-width: 400px;
    }

    .buttons {
      position: relative;
      height: 120px;
    }

    button {
      padding: 15px 35px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      position: absolute;
    }

    #yesBtn {
      background: #4CAF50;
      color: white;
      left: 50%;
      transform: translateX(-50%);
    }

    #noBtn {
      background: #ff4d4d;
      color: white;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    #noMessage {
      display: none;
      margin-top: 20px;
    }

    #noMessage img {
      margin-top: 15px;
      max-width: 100%;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Will you be my Valentine? ❤️</h1>

    <div class="buttons">
      <button id="yesBtn">Yes</button>
      <button id="noBtn">No</button>
    </div>

    <div id="noMessage">
      <h2>Dahil na nag-no ka pautang 300</h2>
      <img src="./IMG_20260214_055240.jpg" alt="300 pesos">
    </div>
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const noMessage = document.getElementById("noMessage");

    function moveYesButton() {
      const container = document.querySelector(".container");
      const maxX = container.clientWidth - yesBtn.offsetWidth;
      const maxY = container.clientHeight - yesBtn.offsetHeight - 60;

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      yesBtn.style.left = randomX + "px";
      yesBtn.style.top = randomY + "px";
      yesBtn.style.transform = "none";
    }

    yesBtn.addEventListener("mouseover", moveYesButton);
    yesBtn.addEventListener("touchstart", function (e) {
      e.preventDefault();
      moveYesButton();
    });

    noBtn.addEventListener("click", function () {
      noMessage.style.display = "block";
      yesBtn.style.display = "none";
      noBtn.style.display = "none";
    });
  </script>

</body>
</html>
